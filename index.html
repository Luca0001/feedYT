<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Iscrizioni</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  /* ── DARK (default) ── */
  :root {
    --bg: #0a0a0a; --surface: #111; --border: #222;
    --accent: #e8ff00; --accent-faint: rgba(232,255,0,0.05);
    --text: #e0e0e0; --muted: #555; --muted2: #333;
    --spotify: #1db954; --seen: #00c896;
    --card-base: #0e0e0e; --card-mix: 7%; --card-mix-hover: 13%;
    --age-mix: 50%; --age-mix2: 35%;
    --log-row-border: #141414; --log-bar-bg: #1a1a1a;
    --trash-header-border: #333; --trash-header-color: #888;
    --seen-idle: #1a2e1a; --seen-hover: #1f3f1f;
    --dismiss-idle: #222; --dismiss-hover: #333;
    --modal-bg: #0f0f0f; --modal-ch-border: #1a1a1a;
    --remove-btn-border: #2a2a2a; --remove-btn-color: #444;
    --error-bg: #1a0000; --error-border: #400; --error-color: #ff6666;
    --sp-checking: #252525;
  }
  /* ── LIGHT ── */
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f4f0; --surface: #fff; --border: #ddd;
      --accent: #b8a800; --accent-faint: rgba(184,168,0,0.07);
      --text: #1a1a1a; --muted: #999; --muted2: #ccc;
      --spotify: #1db954; --seen: #009e72;
      --card-base: #fafaf7; --card-mix: 9%; --card-mix-hover: 16%;
      --age-mix: 60%; --age-mix2: 45%;
      --log-row-border: #ebebeb; --log-bar-bg: #e0e0e0;
      --trash-header-border: #ccc; --trash-header-color: #aaa;
      --seen-idle: #d0ede5; --seen-hover: #a0ddd0;
      --dismiss-idle: #ddd; --dismiss-hover: #bbb;
      --modal-bg: #fff; --modal-ch-border: #eee;
      --remove-btn-border: #ddd; --remove-btn-color: #bbb;
      --error-bg: #fff0f0; --error-border: #ffbbbb; --error-color: #cc3333;
      --sp-checking: #ccc;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: "IBM Plex Sans", sans-serif; font-size: 16px; min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 100; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  header h1 {
    font-family: "IBM Plex Mono", monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); white-space: nowrap;
  }
  #progress-bar { flex: 1; min-width: 60px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
  #status { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
  #controls { width: 100%; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: "IBM Plex Mono", monospace; font-size: 12px; padding: 7px 12px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:hover, .filter-btn:active { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }
  #count { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

  #feed { padding: 0 0 80px; max-width: 100%; }
  @media (min-width: 700px) {
    #feed { padding: 0 24px 80px; max-width: 900px; margin: 0 auto; }
    header { padding: 14px 24px; }
  }

  /* ── Card stile A: colori per canale ── */
  .video-card {
    margin: 8px 10px; border-radius: 5px; padding: 0;
    border-left: 3px solid var(--ch-color, #333);
    background: color-mix(in srgb, var(--ch-color, #333) var(--card-mix), var(--card-base));
    display: grid; grid-template-columns: 44px 1fr auto; gap: 0; align-items: stretch;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .video-card:hover { background: color-mix(in srgb, var(--ch-color, #333) var(--card-mix-hover), var(--card-base)); }
  @media (min-width: 700px) { .video-card { margin: 8px 0; } }

  .age-col {
    font-family: "IBM Plex Mono", monospace; text-align: right;
    padding: 13px 0 11px; display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
  }
  .age-col .days { font-size: 20px; font-weight: 600; color: color-mix(in srgb, var(--ch-color, #333) var(--age-mix), #3a3a3a); line-height: 1; display: block; }
  .age-col .unit { font-size: 9px; letter-spacing: 0.08em; color: color-mix(in srgb, var(--ch-color, #333) var(--age-mix2), #2a2a2a); display: block; margin-top: 2px; }

  .info-col { padding: 13px 12px 11px; min-width: 0; }

  .channel-name {
    font-family: "IBM Plex Sans", sans-serif; font-size: 11px; font-weight: 600;
    color: var(--ch-color, #777); letter-spacing: 0.04em; text-transform: uppercase;
    display: block; margin-bottom: 4px;
  }
  .video-title {
    color: var(--text); text-decoration: none; font-size: 15px;
    font-weight: 400; line-height: 1.4; display: block;
  }
  .video-title:hover { color: var(--accent); }

  .meta { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .yt-link {
    color: #dd2222; text-decoration: none; font-family: "IBM Plex Mono", monospace;
    font-size: 14px; font-weight: 600; letter-spacing: 0.05em;
    border: 1px solid rgba(200,0,0,0.3); padding: 6px 14px; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .yt-link:hover, .yt-link:active { background: rgba(200,0,0,0.12); border-color: #dd2222; }

  .sp-link {
    color: var(--spotify); text-decoration: none; font-family: "IBM Plex Mono", monospace;
    font-size: 14px; font-weight: 600; letter-spacing: 0.05em;
    border: 1px solid rgba(29,185,84,0.3); padding: 6px 14px; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sp-link:hover, .sp-link:active { background: rgba(29,185,84,0.12); border-color: var(--spotify); }
  .sp-checking { font-size: 11px; color: var(--sp-checking); }

  /* ── Pulsanti azione: O (visto) e X (scarta) — fianco a fianco, altezza piena ── */
  .action-btns {
    display: flex; flex-direction: row; gap: 0; align-items: stretch; align-self: stretch;
    border-left: 1px solid color-mix(in srgb, var(--ch-color, #333) 15%, transparent);
  }
  .seen-btn, .dismiss-btn {
    background: none; border: none; line-height: 1; display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0 10px; transition: color 0.15s, background 0.15s; height: 100%;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .seen-btn { font-size: 22px; color: var(--seen-idle); border-right: 1px solid color-mix(in srgb, var(--ch-color, #333) 12%, transparent); }
  .seen-btn:hover, .seen-btn:active { color: var(--seen); background: color-mix(in srgb, var(--seen) 10%, transparent); }
  .dismiss-btn { font-size: 28px; color: var(--dismiss-idle); }
  .dismiss-btn:hover, .dismiss-btn:active { color: #ff3333; background: rgba(255,50,50,0.07); }
  .video-card:hover .seen-btn { color: var(--seen-hover); }
  .video-card:hover .dismiss-btn { color: var(--dismiss-hover); }

  #empty { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--muted); text-align: center; padding: 80px 0; display: none; }
  #error-banner {
    display: none; background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-color);
    font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 10px 16px;
    text-align: center; line-height: 1.6;
  }

  /* ── LOG view ── */
  #log-view { display: none; padding: 16px 10px 80px; max-width: 900px; margin: 0 auto; }
  #log-view h2 { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .log-table { width: 100%; border-collapse: collapse; }
  .log-table th {
    font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); text-align: left;
    border-bottom: 1px solid var(--border); padding: 6px 8px;
  }
  .log-table th.num { text-align: right; }
  .log-table td {
    font-family: "IBM Plex Sans", sans-serif; font-size: 13px;
    padding: 7px 8px; border-bottom: 1px solid var(--log-row-border); vertical-align: middle;
  }
  .log-table td.num { font-family: "IBM Plex Mono", monospace; font-size: 12px; text-align: right; color: var(--muted); }
  .log-swatch { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 7px; vertical-align: middle; flex-shrink: 0; }
  .log-ch-cell { display: flex; align-items: center; }
  .log-bar-wrap { flex: 1; max-width: 70px; background: var(--log-bar-bg); height: 3px; border-radius: 2px; margin-left: 10px; }
  .log-bar { height: 3px; border-radius: 2px; }
  /* sospeso nel LOG */
  .log-suspended td { opacity: 0.45; }
  .log-suspended .log-ch-name { text-decoration: line-through; }
  .log-suspend-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: "IBM Plex Mono", monospace; font-size: 10px; padding: 3px 8px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .log-suspend-btn:hover { border-color: #ff4444; color: #ff4444; }
  .log-suspend-btn.undo { border-color: var(--muted2); color: var(--muted); }
  .log-suspend-btn.undo:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Modal ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 200; overflow-y: auto;
  }
  #modal-overlay.open { display: block; }
  #modal-box {
    background: var(--modal-bg); border: 1px solid var(--border);
    margin: 40px auto; max-width: 560px; width: calc(100% - 32px); padding: 24px;
  }
  #modal-box h2 {
    font-family: "IBM Plex Mono", monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
  }
  #modal-subtitle { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); margin-bottom: 20px; }
  #modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 26px; cursor: pointer; line-height: 1; margin-top: -4px; }
  #modal-close:hover { color: var(--text); }
  .channel-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--modal-ch-border); }
  .channel-row-name { font-family: "IBM Plex Sans", sans-serif; font-size: 14px; color: var(--text); }
  .channel-row-name.removed { color: var(--muted); text-decoration: line-through; }
  .remove-channel-btn {
    background: none; border: 1px solid var(--remove-btn-border); color: var(--remove-btn-color);
    font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 5px 10px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; margin-left: 12px;
  }
  .remove-channel-btn:hover { border-color: #ff4444; color: #ff4444; }
  .remove-channel-btn.undo { border-color: var(--muted2); color: var(--muted); }
  .remove-channel-btn.undo:hover { border-color: var(--accent); color: var(--accent); }
  #modal-footer { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .modal-action-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 8px 16px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s;
  }
  .modal-action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-action-btn.primary { border-color: var(--accent); color: var(--accent); }
  .modal-action-btn.primary:hover { background: var(--accent-faint); }

  /* ── DEL modal ── */
  #del-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 300; overflow-y: auto;
  }
  #del-overlay.open { display: flex; align-items: center; justify-content: center; }
  #del-box {
    background: var(--modal-bg); border: 1px solid var(--border);
    max-width: 400px; width: calc(100% - 32px); padding: 24px;
  }
  #del-box h2 {
    font-family: "IBM Plex Mono", monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; color: #ff4444; margin-bottom: 12px;
  }
  #del-box p { font-family: "IBM Plex Sans", sans-serif; font-size: 14px; color: var(--text); margin-bottom: 18px; line-height: 1.5; }
  #del-box p strong { color: #ff4444; }
  #del-days-input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: "IBM Plex Mono", monospace; font-size: 20px; font-weight: 600;
    padding: 10px 14px; width: 100%; margin-bottom: 16px; text-align: center;
  }
  #del-days-input:focus { outline: none; border-color: #ff4444; }
  .del-footer { display: flex; gap: 10px; }
  .del-btn-cancel {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 8px 16px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s;
  }
  .del-btn-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .del-btn-confirm {
    background: none; border: 1px solid #ff4444; color: #ff4444;
    font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 8px 16px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s;
    flex: 1;
  }
  .del-btn-confirm:hover { background: rgba(255,60,60,0.1); }

  /* ── LOG stats box ── */
  .log-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px; background: var(--border); border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .log-stats-cell {
    background: var(--card-base); padding: 10px 12px; text-align: center;
  }
  .log-stats-cell .stat-label {
    font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px;
  }
  .log-stats-cell .stat-val {
    font-family: "IBM Plex Mono", monospace; font-size: 18px; font-weight: 600;
    color: var(--text); display: block;
  }
  .log-stats-cell.seen .stat-val { color: var(--seen); }
  .log-stats-cell.dismissed .stat-val { color: #ff5555; }
  .log-stats-cell.nuovo .stat-val { color: var(--accent); }
  .log-stats-row-label {
    font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); padding: 8px 12px;
    background: var(--card-base); display: flex; align-items: center;
  }

  /* canale cliccabile nel LOG */
  .log-ch-name { cursor: pointer; text-decoration: underline; text-decoration-style: dotted;
    text-underline-offset: 3px; }
  .log-ch-name:hover { color: var(--accent); }

  /* ── Dettaglio canale ── */
  #ch-detail { display: none; padding: 0 0 80px; }
  .ch-detail-header {
    display: flex; align-items: center; gap: 12px; padding: 14px 10px 10px;
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .ch-detail-back {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 5px 10px;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .ch-detail-back:hover { border-color: var(--accent); color: var(--accent); }
  .ch-detail-title {
    font-family: "IBM Plex Mono", monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .ch-video-row {
    display: grid; grid-template-columns: 32px 1fr 32px;
    gap: 0 10px; align-items: center;
    padding: 8px 10px; border-bottom: 1px solid var(--log-row-border);
  }
  .ch-video-age { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); text-align: right; }
  .ch-video-title { font-family: "IBM Plex Sans", sans-serif; font-size: 13px; line-height: 1.4; }
  .ch-video-title a { color: var(--text); text-decoration: none; }
  .ch-video-title a:hover { color: var(--accent); }
  .ch-video-badge { font-size: 16px; text-align: center; }

  /* ── Aggiungi canale nel modal ── */
  .add-channel-form { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .add-channel-form label {
    font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px;
  }
  .add-channel-form input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: "IBM Plex Mono", monospace; font-size: 13px;
    padding: 8px 10px; width: 100%; margin-bottom: 8px;
  }
  .add-channel-form input:focus { outline: none; border-color: var(--accent); }
  #add-ch-status { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); min-height: 16px; }
</style>
</head>
<body>

<header>
  <h1>Feed</h1>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="status">Avvio...</div>
  <div id="controls">
    <button class="filter-btn active" onclick="setFilter('yt',this)">YT</button>
    <button class="filter-btn" onclick="setFilter('spotify',this)">SPF</button>
    <button class="filter-btn" id="trash-btn" onclick="setFilter('dismissed',this)">&#x1F5D1;</button>
    <button class="filter-btn" onclick="setFilter('log',this)">LOG</button>
    <button class="filter-btn" onclick="openDelModal()" title="Elimina video vecchi" style="color:#ff5555;border-color:#441111;">DEL</button>
    <button class="filter-btn" onclick="clearCacheAndReload()" title="Aggiorna feed">&#x21BA;</button>
    <span id="count"></span>
  </div>
</header>

<div id="error-banner"></div>
<div id="feed"></div>
<div id="log-view"></div>
<div id="ch-detail"></div>
<div id="empty">Nessun risultato</div>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">&#xD7;</button>
    <h2>Canali</h2>
    <div id="modal-subtitle"></div>
    <div id="modal-list"></div>
    <div class="add-channel-form">
      <label>Aggiungi canale (URL o ID)</label>
      <input id="add-ch-input" type="text" placeholder="https://youtube.com/@nomeutente oppure UC...">
      <div id="add-ch-status"></div>
    </div>
    <div id="modal-footer">
      <button class="modal-action-btn" onclick="addChannelFromInput()">+ Aggiungi</button>
      <button class="modal-action-btn primary" onclick="applyChannelChanges()">Applica e ricarica</button>
      <button class="modal-action-btn" onclick="closeModal()">Annulla</button>
    </div>
  </div>
</div>
<div id="del-overlay">
  <div id="del-box">
    <h2>&#x26A0; Elimina video vecchi</h2>
    <p>Elimina dal feed tutti i video più vecchi di <strong><span id="del-days-preview">7</span> giorni</strong>.<br>Verranno marcati come scartati e rimossi dalla vista. Operazione reversibile dal cestino.</p>
    <input id="del-days-input" type="number" min="1" max="365" value="7" oninput="document.getElementById('del-days-preview').textContent=this.value">
    <div class="del-footer">
      <button class="del-btn-cancel" onclick="closeDelModal()">Annulla</button>
      <button class="del-btn-confirm" onclick="confirmDel()">Elimina video &gt; <span id="del-days-confirm">7</span> gg</button>
    </div>
  </div>
</div>

<script>

  ["UC3XTzVzaHQEd30rQbuvCtTQ","LastWeekTonight"],
  ["UC4V3oCikXeSqYQr0hBMARwg","Breaking Italy"],
  ["UC5yXB_ThsufRJYMRlzIGoeQ","andreagaleazzi"],
  ["UC6n4FXGXlVWJU9Rj0pWSzAQ","Francesco Baistrocchi"],
  ["UC6nSFpj9HTCZ5t-N3Rm3-HA","Vsauce"],
  ["UC6njEey49emrxFSzxPoKwFg","Caffe Design"],
  ["UC6rMvMN5auRTqHlI2w5JO5w","Mig Babol"],
  ["UC6x7GwJxuoABSosgVXDYtTw","I Like To Make Stuff"],
  ["UC7GkPVpg45VICZ2mRMCgZyw","Jessica Kirson"],

const CH_PALETTE = [
  "#e05a5a","#e07a3a","#d4a030","#7ec85c","#44c4a1",
  "#3ab0d8","#6a8ce8","#a06ad8","#d86ab0","#c0c040",

function channelColor(channelId) {
  let h = 0;
  for (let i = 0; i < channelId.length; i++) h = (h * 31 + channelId.charCodeAt(i)) >>> 0;
  return CH_PALETTE[h % CH_PALETTE.length];
}

const PROXIES = [
  url => "https://corsproxy.io/?" + encodeURIComponent(url),
  url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  url => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
];
let workingProxyIdx = 0;

async function fetchWithProxy(url) {
  const order = [workingProxyIdx, ...PROXIES.map((_,i)=>i).filter(i=>i!==workingProxyIdx)];
  for (const i of order) {
    try {
      const resp = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(9000) });
      if (resp.ok) { const t = await resp.text(); if (t && t.length > 50) { workingProxyIdx = i; return t; } }
    } catch(e) {}
  }
  return null;
}

async function fetchChannelFeed(channelId, channelName) {
  const text = await fetchWithProxy("https://www.youtube.com/feeds/videos.xml?channel_id=" + channelId);
  if (!text) return [];
  try {
    const xml = new DOMParser().parseFromString(text, "application/xml");
    if (xml.querySelector("parsererror")) return [];
    const now = new Date();
    return Array.from(xml.querySelectorAll("entry")).map(entry => {
      const title = entry.querySelector("title")?.textContent?.trim() || "";
      const link = entry.querySelector("link")?.getAttribute("href") || "";
      const published = entry.querySelector("published")?.textContent || "";
      const nsVideoId = entry.getElementsByTagNameNS("http://www.youtube.com/xml/schemas/2015","videoId")[0]?.textContent;
      const videoId = nsVideoId || link.split("v=")[1]?.split("&")[0] || Math.random().toString(36).slice(2);
      const pubDate = new Date(published);
      const ageDays = Math.max(0, Math.floor((now - pubDate) / 86400000));
      return { title, link, channelName, channelId, ageDays, pubDate, videoId, spotifyStatus: "pending" };
    }).filter(v => {
      if (!v.title || !v.link) return false;
      if (v.link.includes("/shorts/")) return false;
      if (/^#shorts/i.test(v.title)) return false;
      if (v.ageDays > MAX_DAYS) return false;
      return true;
    });
  } catch(e) { return []; }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, videos } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null;
    videos.forEach(v => { v.pubDate = new Date(v.pubDate); });
    return videos;
  } catch(e) { return null; }
}
function saveCache(videos) {
  try {
    const slim = videos.map(v => ({
      title: v.title, link: v.link, channelName: v.channelName,
      channelId: v.channelId, ageDays: v.ageDays,
      pubDate: v.pubDate.toISOString(), videoId: v.videoId, spotifyStatus: "pending"
    }));
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), videos: slim }));
  } catch(e) {}
}

const podcastCache = {};
async function hasPodcast(channelName) {
  if (podcastCache[channelName] !== undefined) return podcastCache[channelName];
  try {
    const resp = await fetch(
      "https://itunes.apple.com/search?term=" + encodeURIComponent(channelName) + "&entity=podcast&limit=5&country=IT",
      { signal: AbortSignal.timeout(6000) }
    );
    if (!resp.ok) { podcastCache[channelName] = false; return false; }
    const data = await resp.json();
    const found = data.results?.some(r => {
      const name = (r.collectionName || r.artistName || "").toLowerCase();
      const ch = channelName.toLowerCase();
      return name.includes(ch) || ch.includes(name.split(" ")[0]);
    }) || false;
    podcastCache[channelName] = found;
    return found;
  } catch(e) { podcastCache[channelName] = false; return false; }
}
function spotifyUrl(ch, title) {
  return "https://open.spotify.com/search/" + encodeURIComponent(ch + " " + title.slice(0, 50)) + "/episodes";
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

let dismissed = new Set(JSON.parse(localStorage.getItem("dismissed") || "[]"));
let seen      = new Set(JSON.parse(localStorage.getItem("seen")      || "[]"));

const GAS_URL = "https://script.google.com/macros/s/AKfycbw1nR_gTg5wJCs5YevTkGONWviWQcHbFwVvcVTWOwHObPAF8AONxtBPGxAsZkhsIDY/exec";

async function loadDismissed() {
  try {
    const resp = await fetch(GAS_URL + "?callback=_cb", { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) return;
    const text = await resp.text();
    const json = text.replace(/^_cb\(/, "").replace(/\)$/, "");
    const data = JSON.parse(json);
    Object.entries(data).forEach(([vid, val]) => {
      if (val.status === "dismissed") dismissed.add(vid);
      else if (val.status === "seen") seen.add(vid);
    });
    localStorage.setItem("dismissed", JSON.stringify([...dismissed]));
    localStorage.setItem("seen", JSON.stringify([...seen]));
    renderAll();
  } catch(e) {}
}

async function saveRemote(videoId, status, channelName) {
  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ videoID: videoId, status, channelName }),
      signal: AbortSignal.timeout(8000)
    });
  } catch(e) {}
}

function saveDismissed() {
  localStorage.setItem("dismissed", JSON.stringify([...dismissed]));
}
function saveSeen() {
  localStorage.setItem("seen", JSON.stringify([...seen]));
}

function dismiss(videoId) {
  const v = allVideos.find(x => x.videoId === videoId);
  dismissed.add(videoId); seen.delete(videoId);
  saveDismissed(); saveSeen();
  saveRemote(videoId, "dismissed", v?.channelName || "");
  const row = document.getElementById("row-" + videoId);
  if (row) { row.style.opacity = "0"; row.style.transition = "opacity 0.18s"; setTimeout(()=>renderAll(), 200); }
}
function markSeen(videoId) {
  const v = allVideos.find(x => x.videoId === videoId);
  seen.add(videoId); dismissed.delete(videoId);
  saveSeen(); saveDismissed();
  saveRemote(videoId, "seen", v?.channelName || "");
  const row = document.getElementById("row-" + videoId);
  if (row) { row.style.opacity = "0"; row.style.transition = "opacity 0.18s"; setTimeout(()=>renderAll(), 200); }
}
function restore(videoId) { dismissed.delete(videoId); saveDismissed(); renderAll(); }
function restoreAll() {
  dismissed.clear(); saveDismissed(); activeFilter = "yt";
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(".filter-btn").classList.add("active");
  renderAll();
}

function getFiltered() {
  if (activeFilter === "dismissed") {
    return [...allVideos].filter(v => dismissed.has(v.videoId))
      .sort((a,b) => a.ageDays - b.ageDays || b.pubDate - a.pubDate);
  }
  let list = allVideos.filter(v => !dismissed.has(v.videoId) && !seen.has(v.videoId));
  if (activeFilter === "spotify") list = list.filter(v => v.spotifyStatus === "found");
  return [...list].sort((a,b) => a.ageDays - b.ageDays || b.pubDate - a.pubDate);
}

function renderSpotifyBadge(v) {
  if (v.spotifyStatus === "pending") return "<span class=\"sp-checking\">...</span>";
  if (v.spotifyStatus === "found")   return "<a class=\"sp-link\" href=\"" + esc(v.spotifyUrl) + "\" target=\"_blank\" rel=\"noopener\">SPOTIFY &#x2197;</a>";
  return "";
}

function buildStats() {
  const stats = {};
  allVideos.forEach(v => {
    if (!stats[v.channelId]) stats[v.channelId] = { name: v.channelName, id: v.channelId, total: 0, seen: 0, dismissed: 0, videos: [] };
    stats[v.channelId].total++;
    stats[v.channelId].videos.push(v);
    if (seen.has(v.videoId))           stats[v.channelId].seen++;
    else if (dismissed.has(v.videoId)) stats[v.channelId].dismissed++;
  });
  return stats;
}

  document.getElementById("feed").innerHTML = "";
  document.getElementById("empty").style.display = "none";
  document.getElementById("ch-detail").style.display = "none";

  const stats = buildStats();
  const rows = Object.values(stats).sort((a,b) => b.total - a.total);

    if (v.ageDays <= 7)  { if (isNew) w_new++;  else if (isSeen) w_seen++;  else w_dis++;  }

    html += "<tr class=\"" + (susp ? "log-suspended" : "") + "\" id=\"log-row-" + r.id + "\">"
      + "<td><div class=\"log-ch-cell\">"

  if (!r) return;
  const color = channelColor(channelId);
  document.getElementById("log-view").style.display = "none";

  const videos = r.videos
    .filter(v => seen.has(v.videoId) || dismissed.has(v.videoId))
    .sort((a,b) => a.ageDays - b.ageDays);

  let html = "<div class=\"ch-detail-header\">"
    + "<button class=\"ch-detail-back\" onclick=\"backToLog()\">&#x2190; LOG</button>"
    + "<span class=\"ch-detail-title\" style=\"color:" + color + "\">" + esc(r.name) + "</span>"
    + "</div>";

  if (!videos.length) {
    html += "<div style=\"padding:40px 10px;font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:var(--muted);text-align:center;\">Nessun video segnato per questo canale.</div>";
  } else {
    videos.forEach(v => {
      const badge = seen.has(v.videoId) ? "<span style=\"color:var(--seen)\">&#x25CB;</span>" : "<span style=\"color:#ff5555\">&#xD7;</span>";
      html += "<div class=\"ch-video-row\">"
        + "<div class=\"ch-video-age\">" + v.ageDays + "gg</div>"
        + "<div class=\"ch-video-title\"><a href=\"" + esc(v.link) + "\" target=\"_blank\" rel=\"noopener\">" + esc(v.title) + "</a></div>"
        + "<div class=\"ch-video-badge\">" + badge + "</div>"
      + "</div>";
    });
  }

  const det = document.getElementById("ch-detail");
  det.innerHTML = html;
  det.style.display = "block";
}

function backToLog() {
  document.getElementById("ch-detail").style.display = "none";
  renderLog();
}

function toggleSuspend(channelId) {
  if (suspendedChannels.has(channelId)) {
    suspendedChannels.delete(channelId);
  } else {
    suspendedChannels.add(channelId);
    allVideos.forEach(v => { if (v.channelId === channelId) dismissed.add(v.videoId); });
    saveDismissed();
  }
  saveSuspended();
  renderLog();
}

function refreshSpotifyBadge(videoId) {
  const v = allVideos.find(x => x.videoId === videoId);
  if (!v) return;
  const el = document.getElementById("sp-" + videoId);
  if (el) el.innerHTML = renderSpotifyBadge(v);
  if (activeFilter === "spotify") renderAll();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
}

// ── DEL modal ──
function openDelModal() {
  const inp = document.getElementById("del-days-input");
  inp.value = 7;
  document.getElementById("del-days-preview").textContent = 7;
  document.getElementById("del-days-confirm").textContent = 7;
  inp.oninput = () => {
    document.getElementById("del-days-preview").textContent = inp.value;
    document.getElementById("del-days-confirm").textContent = inp.value;
  };
  document.getElementById("del-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
  setTimeout(() => inp.focus(), 50);
}
function closeDelModal() {
  document.getElementById("del-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
function confirmDel() {
  const days = parseInt(document.getElementById("del-days-input").value, 10);
  if (isNaN(days) || days < 1) return;
  let count = 0;
  allVideos.forEach(v => {
    if (v.ageDays > days) { dismissed.add(v.videoId); count++; }
  });
  saveDismissed();
  closeDelModal();
  renderAll();
  document.getElementById("status").textContent = count + " video eliminati (>" + days + " gg)";
}
document.getElementById("del-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("del-overlay")) closeDelModal();
});

function clearCacheAndReload() { localStorage.removeItem(CACHE_KEY); location.reload(); }

let pendingRemovals = new Set();
function openModal() {
  pendingRemovals = new Set();
  const list = document.getElementById("modal-list");
  document.getElementById("modal-subtitle").textContent = CHANNELS.length + " canali attivi";
  list.innerHTML = "";
  const sorted = [...CHANNELS].sort((a,b) => a[1].localeCompare(b[1], "it", {sensitivity:"base"}));
  sorted.forEach(([id, name]) => {
    const row = document.createElement("div");
    row.className = "channel-row";
    row.id = "ch-row-" + id;
    row.innerHTML = "<span class=\"channel-row-name\" id=\"ch-name-" + id + "\">" + esc(name) + "</span>"
      + "<button class=\"remove-channel-btn\" id=\"ch-btn-" + id + "\" onclick=\"toggleRemoveChannel('" + id + "')\">Rimuovi</button>";
    list.appendChild(row);
  });
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function toggleRemoveChannel(id) {
  const nameEl = document.getElementById("ch-name-" + id);
  const btn    = document.getElementById("ch-btn-"  + id);
  if (pendingRemovals.has(id)) {
    pendingRemovals.delete(id);
    nameEl.classList.remove("removed");
    btn.textContent = "Rimuovi"; btn.classList.remove("undo");
  } else {
    pendingRemovals.add(id);
    nameEl.classList.add("removed");
    btn.textContent = "Annulla"; btn.classList.add("undo");
  }
  document.getElementById("modal-subtitle").textContent = pendingRemovals.size > 0
    ? CHANNELS.length + " canali · " + pendingRemovals.size + " da rimuovere"
    : CHANNELS.length + " canali attivi";
}
function applyChannelChanges() {
  if (pendingRemovals.size === 0) { closeModal(); return; }
  const newList = CHANNELS.filter(([id]) => !pendingRemovals.has(id));
  saveChannels(newList); CHANNELS = newList;
  localStorage.removeItem(CACHE_KEY);
  closeModal(); location.reload();
}

async function addChannelFromInput() {
  const inp = document.getElementById("add-ch-input");
  const raw = inp.value.trim();
  const statusEl = document.getElementById("add-ch-status");
  if (!raw) return;
  statusEl.textContent = "Ricerca in corso...";

  // Estrai ID canale da vari formati URL o ID diretto
  let channelId = null;
  let channelName = null;

  // ID canale diretto
  if (/^UC[\w-]{22}$/.test(raw)) {
    channelId = raw;
  }
  // URL /channel/UCxxx
  else if (raw.includes("/channel/")) {
    const m = raw.match(/\/channel\/(UC[\w-]{22})/);
    if (m) channelId = m[1];
  }
  // URL video watch?v= → ricava il canale dal feed del video
  else if (raw.includes("watch?v=") || raw.includes("youtu.be/")) {
    const vidId = raw.includes("watch?v=")
      ? raw.split("watch?v=")[1].split("&")[0]
      : raw.split("youtu.be/")[1].split("?")[0];
    statusEl.textContent = "Cerco il canale dal video...";
    try {
      // Il feed RSS di un video contiene il channelId
      const text = await fetchWithProxy("https://www.youtube.com/feeds/videos.xml?v=" + vidId);
      if (text) {
        const xml = new DOMParser().parseFromString(text, "application/xml");
        // channelId è nell'URI del feed
        const uri = xml.querySelector("uri")?.textContent || "";
        const m2 = uri.match(/channel\/(UC[\w-]{22})/);
        if (m2) channelId = m2[1];
        channelName = xml.querySelector("author > name")?.textContent?.trim() || null;
      }
    } catch(e) {}
    // Fallback: leggi feed del canale tramite videoId
    if (!channelId) {
      try {
        const text2 = await fetchWithProxy("https://www.youtube.com/feeds/videos.xml?v=" + vidId);
        if (text2) {
          const m3 = text2.match(/channel_id=(UC[\w-]{22})/);
          if (m3) channelId = m3[1];
        }
      } catch(e) {}
    }
  }
  // @handle o URL /@handle
  else {
    const handleMatch = raw.match(/\/@?([\w.]+)/);
    const handle = handleMatch ? handleMatch[1] : raw.trim();
    try {
      const text = await fetchWithProxy("https://www.youtube.com/feeds/videos.xml?user=" + handle);
      if (text) {
        const xml = new DOMParser().parseFromString(text, "application/xml");
        const uri = xml.querySelector("uri")?.textContent || "";
        const m2 = uri.match(/channel\/(UC[\w-]{22})/);
        if (m2) channelId = m2[1];
        channelName = xml.querySelector("author > name")?.textContent?.trim() || handle;
      }
    } catch(e) {}
  }

  if (channelId && !channelName) {
    // Prendi il nome dal feed del canale
    try {
      const text = await fetchWithProxy("https://www.youtube.com/feeds/videos.xml?channel_id=" + channelId);
      if (text) {
        const xml = new DOMParser().parseFromString(text, "application/xml");
        channelName = xml.querySelector("author > name")?.textContent?.trim() || channelId;
      }
    } catch(e) {}
  }

  if (!channelId) {
    statusEl.style.color = "#ff5555";
    statusEl.textContent = "Canale non trovato. Prova con l\'ID (UC...) o URL completo.";
    return;
  }

  // Controlla duplicati
  if (CHANNELS.find(([id]) => id === channelId)) {
    statusEl.style.color = "var(--muted)";
    statusEl.textContent = "Canale già presente: " + (channelName || channelId);
    return;
  }

  CHANNELS.push([channelId, channelName || channelId]);
  saveChannels(CHANNELS);
  inp.value = "";
  statusEl.style.color = "var(--seen)";
  statusEl.textContent = "✓ Aggiunto: " + (channelName || channelId);

  // Aggiorna la lista nel modal
  const row = document.createElement("div");
  row.className = "channel-row";
  row.id = "ch-row-" + channelId;
  row.innerHTML = "<span class=\"channel-row-name\" id=\"ch-name-" + channelId + "\">" + esc(channelName || channelId) + "</span>"
    + "<button class=\"remove-channel-btn\" id=\"ch-btn-" + channelId + "\" onclick=\"toggleRemoveChannel('" + channelId + "')\" >Rimuovi</button>";
  document.getElementById("modal-list").appendChild(row);
  document.getElementById("modal-subtitle").textContent = CHANNELS.length + " canali attivi";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

async function init() {
  
  loadDismissed();
  const cached = loadCache();
  if (cached) {
    allVideos = cached;
    document.getElementById("progress-fill").style.width = "100%";
    document.getElementById("status").textContent = allVideos.length + " video (cache)";
    renderAll();
    await runSpotifyCheck();
    document.getElementById("status").textContent = allVideos.length + " video ✓";
    renderAll(); return;
  }
  const total = CHANNELS.length;
  let done = 0, totalVids = 0;
  const BATCH = 8;
  for (let i = 0; i < CHANNELS.length; i += BATCH) {
    const batch = CHANNELS.slice(i, i + BATCH);
    const results = await Promise.allSettled(batch.map(([id,name]) => fetchChannelFeed(id, name)));
    results.forEach(r => { if (r.status === "fulfilled" && r.value.length) { allVideos.push(...r.value); totalVids += r.value.length; } });
    done += batch.length;
    document.getElementById("progress-fill").style.width = (done/total*100) + "%";
    document.getElementById("status").textContent = done + "/" + total + " · " + totalVids + " video";
    renderAll();
  }
  if (totalVids === 0) {
    const b = document.getElementById("error-banner");
    b.style.display = "block";
    b.innerHTML = "⚠ Nessun feed caricato. Apri la pagina da GitHub Pages.";
    return;
  }
  saveCache(allVideos);
  document.getElementById("status").textContent = totalVids + " video · Spotify...";
  await runSpotifyCheck();
  document.getElementById("status").textContent = totalVids + " video ✓";
  renderAll();
}

async function runSpotifyCheck() {
  const channels = [...new Set([...allVideos].sort((a,b)=>a.ageDays-b.ageDays).map(v=>v.channelName))];
  for (const ch of channels) {
    const found = await hasPodcast(ch);
    allVideos.forEach(v => {
      if (v.channelName !== ch) return;
      v.spotifyStatus = found ? "found" : "not-found";
      if (found) v.spotifyUrl = spotifyUrl(ch, v.title);
      refreshSpotifyBadge(v.videoId);
    });
    await new Promise(r => setTimeout(r, 60));
  }
}

init();
