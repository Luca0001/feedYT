<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Iscrizioni Sync</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --bg: #0a0a0a; --surface: #111; --border: #222;
            --accent: #e8ff00; --accent-faint: rgba(232,255,0,0.05);
            --text: #e0e0e0; --muted: #555;
            --seen: #00c896; --error-color: #ff6666;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f4f4f0; --surface: #fff; --border: #ddd;
                --accent: #b8a800; --accent-faint: rgba(184,168,0,0.07);
                --text: #1a1a1a; --muted: #999;
                --seen: #009e72;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: "IBM Plex Sans", sans-serif; font-size: 16px; min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 100; background: var(--bg);
            border-bottom: 1px solid var(--border); padding: 12px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: "IBM Plex Mono", monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
        #status { font-family: "IBM Plex Mono", monospace; font-size: 10px; color: var(--muted); }

        .nav-btns { display: flex; gap: 8px; }
        .filter-btn {
            background: none; border: 1px solid var(--border); color: var(--muted);
            font-family: "IBM Plex Mono", monospace; font-size: 11px; padding: 6px 12px;
            cursor: pointer; text-transform: uppercase; transition: all 0.15s;
        }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }

        /* Stats Panel */
        .stats-container { padding: 16px; max-width: 900px; margin: 0 auto; }
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--surface); padding: 15px; border-left: 3px solid var(--accent); }
        .stat-label { display: block; font-size: 10px; font-family: "IBM Plex Mono"; color: var(--muted); text-transform: uppercase; }
        .stat-num { font-size: 24px; font-weight: 600; color: var(--text); }

        /* Log Table */
        .channel-row { 
            padding: 12px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .ch-name { font-weight: 600; cursor: pointer; color: var(--accent); }
        .ch-name:hover { text-decoration: underline; }
        .ch-perc { font-family: "IBM Plex Mono"; font-size: 12px; }

        /* Feed Cards */
        #feed { padding: 10px; max-width: 900px; margin: 0 auto; }
        .video-card {
            background: var(--surface); margin-bottom: 10px; border-radius: 4px;
            display: grid; grid-template-columns: 1fr auto; padding: 12px; gap: 10px;
            border: 1px solid var(--border);
        }
        .video-info { min-width: 0; }
        .video-title { font-size: 15px; text-decoration: none; color: var(--text); display: block; margin-bottom: 4px; line-height: 1.3; }
        .channel-tag { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
        .actions { display: flex; gap: 8px; }
        .btn { 
            width: 40px; height: 40px; border: 1px solid var(--border); 
            background: none; color: var(--muted); cursor: pointer; 
            font-family: "IBM Plex Mono"; font-size: 18px;
        }
        .btn-seen:hover { color: var(--seen); border-color: var(--seen); }
        .btn-dismiss:hover { color: var(--error-color); border-color: var(--error-color); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>Feed Manager</h1>
        <div id="status">Sincronizzazione...</div>
    </div>
    <div class="nav-btns">
        <button id="btn-feed" class="filter-btn active" onclick="showTab('feed')">Feed</button>
        <button id="btn-log" class="filter-btn" onclick="showTab('log')">Log & Stats</button>
    </div>
</header>

<div id="tab-feed">
    <div id="feed">
        <!-- I video appariranno qui -->
    </div>
</div>

<div id="tab-log" class="hidden">
    <div class="stats-container">
        <div class="stats-summary">
            <div class="stat-card">
                <span class="stat-label">Visti Totali</span>
                <span id="total-seen" class="stat-num">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Scartati Totali</span>
                <span id="total-dismissed" class="stat-num">0</span>
            </div>
        </div>
        <h3>Performance Canali (% Scarto)</h3>
        <div id="channel-list-stats" style="margin-top: 15px;">
            <!-- Lista canali qui -->
        </div>
    </div>
</div>

<script>
    const GOOGLE_URL = 'https://google.com';
    
    // Configura qui i tuoi canali (ID YouTube)
    const CHANNELS = [
        'UC_x5XG1OV2P6uYZ5FSM9P_A', // Esempio: aggiungi i tuoi ID qui
        'UCv6UtMS5BAX_X6SjI3HtoOg'
    ];

    let videoState = {};
    let allVideosCached = [];

    // Carica dati dal server
    async function loadData() {
        try {
            const r = await fetch(GOOGLE_URL);
            videoState = await r.json();
            document.getElementById('status').innerText = "Sincronizzato";
            fetchRSS();
        } catch (e) {
            document.getElementById('status').innerText = "Errore connessione";
        }
    }

    // Salva dati sul server
    async function setStatus(id, status, channel) {
        // Update locale immediato
        videoState[id] = { status: status, channel: channel };
        renderFeed();
        
        try {
            await fetch(GOOGLE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ videoID: id, status: status, channelName: channel })
            });
        } catch (e) { console.error("Sync fallito"); }
    }

    // Recupera i video tramite RSS (usando un proxy pubblico)
    async function fetchRSS() {
        allVideosCached = [];
        const proxy = 'https://rss2json.com';
        
        for (let id of CHANNELS) {
            try {
                const res = await fetch(proxy + encodeURIComponent('https://youtube.com' + id));
                const data = await res.json();
                if(data.items) {
                    data.items.forEach(item => {
                        allVideosCached.push({
                            id: item.guid.split(':')[2],
                            title: item.title,
                            channel: item.author,
                            link: item.link,
                            date: new Date(item.pubDate)
                        });
                    });
                }
            } catch (e) {}
        }
        allVideosCached.sort((a,b) => b.date - a.date);
        renderFeed();
    }

    function renderFeed(filterChannel = null) {
        const container = document.getElementById('feed');
        container.innerHTML = '';
        
        allVideosCached.forEach(v => {
            const state = videoState[v.id]?.status;
            
            // Se non c'è filtro, mostra solo i non letti. Se c'è filtro canale, mostra tutto.
            if (!filterChannel && state) return; 
            if (filterChannel && v.channel !== filterChannel) return;

            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-info">
                    <span class="channel-tag">${v.channel}</span>
                    <a href="${v.link}" target="_blank" class="video-title">${v.title}</a>
                    ${state ? `<span style="font-size:10px; color:var(--accent)">Stato attuale: ${state.toUpperCase()}</span>` : ''}
                </div>
                <div class="actions">
                    <button class="btn btn-seen" onclick="setStatus('${v.id}', 'seen', '${v.channel.replace(/'/g, "\\'")}')">O</button>
                    <button class="btn btn-dismiss" onclick="setStatus('${v.id}', 'dismissed', '${v.channel.replace(/'/g, "\\'")}')">X</button>
                </div>
            `;
            container.appendChild(card);
        });
        
        if (container.innerHTML === '') {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted)">Tutto pulito! Controlla il Log per rivedere i video.</div>';
        }
    }

    function updateLog() {
        let seen = 0, dismissed = 0;
        let metrics = {};

        Object.values(videoState).forEach(v => {
            if (v.status === 'seen') seen++;
            if (v.status === 'dismissed') dismissed++;
            
            if (!metrics[v.channel]) metrics[v.channel] = { s: 0, d: 0 };
            v.status === 'seen' ? metrics[v.channel].s++ : metrics[v.channel].d++;
        });

        document.getElementById('total-seen').innerText = seen;
        document.getElementById('total-dismissed').innerText = dismissed;

        const list = document.getElementById('channel-list-stats');
        list.innerHTML = '';
        
        Object.keys(metrics).sort().forEach(ch => {
            const m = metrics[ch];
            const total = m.s + m.d;
            const perc = Math.round((m.d / total) * 100);
            const color = perc > 60 ? '#ff6666' : (perc > 30 ? '#ffaa00' : 'var(--seen)');

            const row = document.createElement('div');
            row.className = 'channel-row';
            row.innerHTML = `
                <span class="ch-name" onclick="filterByChannel('${ch.replace(/'/g, "\\'")}')">${ch}</span>
                <span class="ch-perc" style="color:${color}">${perc}% Scartati (${m.d}/${total})</span>
            `;
            list.appendChild(row);
        });
    }

    function filterByChannel(name) {
        showTab('feed');
        renderFeed(name);
        document.getElementById('status').innerText = "Filtro: " + name;
    }

    function showTab(tab) {
        document.getElementById('tab-feed').classList.toggle('hidden', tab !== 'feed');
        document.getElementById('tab-log').classList.toggle('hidden', tab !== 'log');
        document.getElementById('btn-feed').classList.toggle('active', tab === 'feed');
        document.getElementById('btn-log').classList.toggle('active', tab === 'log');
        if(tab === 'log') updateLog();
    }

    // Avvio
    loadData();
</script>
</body>
</html>
